---
# Source: sweep-patches/templates/kustomization.yaml
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - ../../coreweave
patches:
  # ============================================================================
  # PREFILL
  # ============================================================================
  - target:
      kind: LeaderWorkerSet
      name: wide-ep-llm-d-prefill
    patch: |-
      - op: replace
        path: /metadata/name
        value: wide-ep-llm-d-prefill
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/leaderWorkerTemplate/size
        value: 2
  
  # Env Var Patch (Strategic Merge)
  - target:
      kind: LeaderWorkerSet
      name: wide-ep-llm-d-prefill
    patch: |
      apiVersion: leaderworkerset.x-k8s.io/v1
      kind: LeaderWorkerSet
      metadata:
        name: wide-ep-llm-d-prefill
        labels:
          llm-d.ai/deployment: wide-ep-llm-d
      spec:
        leaderWorkerTemplate:
          workerTemplate:
            metadata:
              labels:
                llm-d.ai/deployment: wide-ep-llm-d
            spec:
              containers:
              - name: vllm
                env:
                - name: DP_SIZE_LOCAL
                  value: "8"
                - name: TP_SIZE
                  value: "1"
                - name: VLLM_ALL2ALL_BACKEND
                  value: "deepep_high_throughput"

  # ============================================================================
  # DECODE
  # ============================================================================
  - target:
      kind: LeaderWorkerSet
      name: wide-ep-llm-d-decode
    patch: |-
      - op: replace
        path: /metadata/name
        value: wide-ep-llm-d-decode
      - op: replace
        path: /spec/replicas
        value: 1
      - op: replace
        path: /spec/leaderWorkerTemplate/size
        value: 2

  # Env Var Patch (Strategic Merge)
  - target:
      kind: LeaderWorkerSet
      name: wide-ep-llm-d-decode
    patch: |
      apiVersion: leaderworkerset.x-k8s.io/v1
      kind: LeaderWorkerSet
      metadata:
        name: wide-ep-llm-d-decode
        labels:
          llm-d.ai/deployment: wide-ep-llm-d
      spec:
        leaderWorkerTemplate:
          workerTemplate:
            metadata:
              labels:
                llm-d.ai/deployment: wide-ep-llm-d
            spec:
              containers:
              - name: vllm
                env:
                - name: DP_SIZE_LOCAL
                  value: "8"
                - name: TP_SIZE
                  value: "1"
                - name: VLLM_ALL2ALL_BACKEND
                  value: "deepep_low_latency"
