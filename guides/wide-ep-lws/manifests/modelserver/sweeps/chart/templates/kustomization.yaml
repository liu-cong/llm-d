{{- /*
Sweep Patches - Direct Kustomization Generation
Renders a Kustomization object directly, which Helm accepts as valid YAML.
*/ -}}
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - base-overlay
patches:
  # ============================================================================
  # PREFILL
  # ============================================================================
  {{- if .Values.enablePrefill }}
  - target:
      kind: LeaderWorkerSet
      name: wide-ep-llm-d-prefill
    patch: |-
      - op: replace
        path: /metadata/name
        value: {{ .Values.name }}-prefill
      - op: replace
        path: /spec/replicas
        value: {{ .Values.replicas }}
      - op: replace
        path: /spec/leaderWorkerTemplate/size
        value: {{ .Values.lwsSize }}
  
  # Env Var Patch (Strategic Merge)
  - target:
      kind: LeaderWorkerSet
      name: wide-ep-llm-d-prefill
    patch: |
      apiVersion: leaderworkerset.x-k8s.io/v1
      kind: LeaderWorkerSet
      metadata:
        name: wide-ep-llm-d-prefill
        labels:
          llm-d.ai/deployment: {{ .Values.name }}
      spec:
        leaderWorkerTemplate:
          workerTemplate:
            metadata:
              labels:
                llm-d.ai/deployment: {{ .Values.name }}
            spec:
              containers:
              - name: vllm
                env:
                - name: DP_SIZE_LOCAL
                  value: "{{ .Values.dpSizeLocal }}"
                - name: TP_SIZE
                  value: "{{ .Values.tpSize }}"
                - name: VLLM_ALL2ALL_BACKEND
                  value: "{{ .Values.prefill.all2allBackend }}"
                {{- range .Values.prefill.extraEnv }}
                - name: {{ .name }}
                  value: "{{ .value }}"
                {{- end }}
  {{- end }}

  # ============================================================================
  # DECODE
  # ============================================================================
  {{- if .Values.enableDecode }}
  - target:
      kind: LeaderWorkerSet
      name: wide-ep-llm-d-decode
    patch: |-
      - op: replace
        path: /metadata/name
        value: {{ .Values.name }}-decode
      - op: replace
        path: /spec/replicas
        value: {{ .Values.replicas }}
      - op: replace
        path: /spec/leaderWorkerTemplate/size
        value: {{ .Values.lwsSize }}

  # Env Var Patch (Strategic Merge)
  - target:
      kind: LeaderWorkerSet
      name: wide-ep-llm-d-decode
    patch: |
      apiVersion: leaderworkerset.x-k8s.io/v1
      kind: LeaderWorkerSet
      metadata:
        name: wide-ep-llm-d-decode
        labels:
          llm-d.ai/deployment: {{ .Values.name }}
      spec:
        leaderWorkerTemplate:
          workerTemplate:
            metadata:
              labels:
                llm-d.ai/deployment: {{ .Values.name }}
            spec:
              containers:
              - name: vllm
                env:
                - name: DP_SIZE_LOCAL
                  value: "{{ .Values.dpSizeLocal }}"
                - name: TP_SIZE
                  value: "{{ .Values.tpSize }}"
                - name: VLLM_ALL2ALL_BACKEND
                  value: "{{ .Values.decode.all2allBackend }}"
                {{- range .Values.decode.extraEnv }}
                - name: {{ .name }}
                  value: "{{ .value }}"
                {{- end }}
  {{- end }}
