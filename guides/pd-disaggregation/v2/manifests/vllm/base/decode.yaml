apiVersion: apps/v1
kind: Deployment
metadata:
  labels: &id001
    llm-d.ai/accelerator-vendor: nvidia
    llm-d.ai/guide: pd-disaggregation
    llm-d.ai/hardware-variant: gpu
    llm-d.ai/inference-serving: 'true'
    llm-d.ai/model: gpt-oss-120b
    llm-d.ai/role: decode
  name: vllm-pd-decode
  namespace: llm-d-pd
spec:
  replicas: 1
  selector:
    matchLabels:
      llm-d.ai/inference-serving: 'true'
      llm-d.ai/role: decode
  template:
    metadata:
      labels: *id001
    spec:
      containers:
      - args:
        - --block-size
        - '128'
        - --kv-transfer-config
        - '{"kv_connector":"NixlConnector", "kv_role":"kv_both"}'
        - --disable-uvicorn-access-log
        - --max-model-len
        - '32000'
        env:
        - name: VLLM_NIXL_SIDE_CHANNEL_HOST
          valueFrom:
            fieldRef:
              fieldPath: status.podIP
        image: ghcr.io/llm-d/llm-d-cuda:v0.5.1
        livenessProbe:
          failureThreshold: 3
          httpGet:
            path: /health
            port: vllm
          periodSeconds: 10
          timeoutSeconds: 5
        modelCommand: vllmServe
        mountModelVolume: true
        name: vllm
        ports:
        - containerPort: 8200
          name: vllm
          protocol: TCP
        - containerPort: 5600
          name: nixl
          protocol: TCP
        readinessProbe:
          failureThreshold: 3
          httpGet:
            path: /v1/models
            port: vllm
          periodSeconds: 5
          timeoutSeconds: 2
        resources:
          limits:
            cpu: '16'
            memory: 64Gi
            rdma/ib: 1
          requests:
            cpu: '16'
            memory: 64Gi
            rdma/ib: 1
        startupProbe:
          failureThreshold: 60
          httpGet:
            path: /v1/models
            port: vllm
          initialDelaySeconds: 15
          periodSeconds: 30
          timeoutSeconds: 5
        volumeMounts:
        - mountPath: /.config
          name: metrics-volume
        - mountPath: /dev/shm
          name: shm
        - mountPath: /.cache
          name: torch-compile-cache
      initContainers:
      - args:
        - --connector=nixlv2
        - --port=8000
        - --vllm-port=8200
        - --secure-proxy=false
        image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.6.0
        name: routing-proxy
        restartPolicy: Always
      serviceAccountName: vllm-pd
      volumes:
      - emptyDir: {}
        name: metrics-volume
      - emptyDir:
          medium: Memory
          sizeLimit: 16Gi
        name: shm
      - emptyDir: {}
        name: torch-compile-cache
