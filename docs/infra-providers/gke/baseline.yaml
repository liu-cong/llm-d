apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: v0.2.0
    helm.sh/chart: llm-d-modelservice-v0.2.11
  name: ms-pd-llm-d-modelservice-decode
  namespace: 
spec:
  replicas: 2
  selector:
    matchLabels:
      llm-d.ai/inferenceServing: "true"
      llm-d.ai/model: ms-pd-llm-d-modelservice
      llm-d.ai/role: decode
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        llm-d.ai/inferenceServing: "true"
        llm-d.ai/model: ms-pd-llm-d-modelservice
        llm-d.ai/role: decode
    spec:
      containers:
      - args:
        - google/gemma-3-27b-it
        - --port
        - "8200"
        - --served-model-name
        - google/gemma-3-27b-it
        - --tensor-parallel-size
        - "4"
        - --block-size
        - "128"
        - --kv-transfer-config
        - '{"kv_connector":"NixlConnector", "kv_role":"kv_both"}'
        - --disable-uvicorn-access-log
        - --max-model-len
        - "32000"
        command:
        - vllm
        - serve
        env:
        - name: VLLM_NIXL_SIDE_CHANNEL_HOST
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        - name: VLLM_LOGGING_LEVEL
          value: DEBUG
        - name: DP_SIZE
          value: "1"
        - name: TP_SIZE
          value: "4"
        - name: HF_HOME
          value: /model-cache
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              key: HF_TOKEN
              name: llm-d-hf-token
        image: ghcr.io/llm-d/llm-d-cuda:v0.3.0
        imagePullPolicy: IfNotPresent
        name: vllm
        securityContext:
          allowPrivilegeEscalation: true
          runAsNonRoot: true
        ports:
        - containerPort: 8200
          name: metrics
          protocol: TCP
        resources:
          claims:
            - name: gpu1
            - name: gpu2
            - name: gpu3
            - name: gpu4
          limits:
            cpu: "16"
            memory: 64Gi
          requests:
            cpu: "16"
            memory: 64Gi
        volumeMounts:
        - mountPath: /.config
          name: metrics-volume
        - mountPath: /dev/shm
          name: shm
        - mountPath: /.cache
          name: torch-compile-cache
        - mountPath: /model-cache
          name: model-storage
      initContainers:
      - args:
        - --port=8000
        - --vllm-port=8200
        - --connector=nixlv2
        - -v=5
        - --secure-proxy=false
        image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.3.0
        imagePullPolicy: Always
        name: routing-proxy
        ports:
        - containerPort: 8000
          protocol: TCP
        resources: {}
        restartPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
      resourceClaims:
        - name: gpu1
          resourceClaimTemplateName: 1-gpu-nic-aligned
        - name: gpu2
          resourceClaimTemplateName: 1-gpu-nic-aligned
        - name: gpu3
          resourceClaimTemplateName: 1-gpu-nic-aligned
        - name: gpu4
          resourceClaimTemplateName: 1-gpu-nic-aligned
      tolerations:
            - key: "nvidia.com/gpu"
              operator: "Equal"
              value: "present"
              effect: "NoSchedule"
      volumes:
      - emptyDir: {}
        name: metrics-volume
      - emptyDir:
          medium: Memory
          sizeLimit: 16Gi
        name: shm
      - emptyDir: {}
        name: torch-compile-cache
      - emptyDir:
          sizeLimit: 100Gi
        name: model-storage
