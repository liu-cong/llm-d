---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: v0.2.0
    helm.sh/chart: llm-d-modelservice-v0.2.11
  name: ms-pd-llm-d-modelservice-prefill
spec:
  replicas: 1
  selector:
    matchLabels:
      llm-d.ai/inferenceServing: "true"
      llm-d.ai/model: ms-pd-llm-d-modelservice
      llm-d.ai/role: prefill
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        llm-d.ai/inferenceServing: "true"
        llm-d.ai/model: ms-pd-llm-d-modelservice
        llm-d.ai/role: prefill
      annotations:
        networking.gke.io/default-interface: 'eth0'
        networking.gke.io/interfaces: |
          [
            {"interfaceName":"eth0","network":"default"},
            {"interfaceName":"eth2","network":"rdma-0"},
            {"interfaceName":"eth3","network":"rdma-1"},
            {"interfaceName":"eth4","network":"rdma-2"},
            {"interfaceName":"eth5","network":"rdma-3"},
            {"interfaceName":"eth6","network":"rdma-4"},
            {"interfaceName":"eth7","network":"rdma-5"},
            {"interfaceName":"eth8","network":"rdma-6"},
            {"interfaceName":"eth9","network":"rdma-7"}
          ]
    spec:
      containers:
      - command:
        - /bin/bash
        - -c
        args:
        - |
          source /usr/local/gib/scripts/set_nccl_env.sh
          export LD_LIBRARY_PATH=/usr/local/nvidia/lib64:${LD_LIBRARY_PATH}
          vllm serve RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic \
            --port 8000 \
            --served-model-name "RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic" \
            --block-size 128 \
            --data-parallel-size 8 \
            --kv-transfer-config '{"kv_connector":"NixlConnector", "kv_role":"kv_both"}' \
            --disable-log-requests \
            --disable-uvicorn-access-log \
            --max-model-len 32000
      # - args:
      #   - google/gemma-3-27b-it # RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic
      #   - --port
      #   - "8000"
      #   - --served-model-name
      #   - google/gemma-3-27b-it
      #   - --block-size
      #   - "128"
      #   - --kv-transfer-config
      #   - '{"kv_connector":"NixlConnector", "kv_role":"kv_both"}'
      #   - --disable-uvicorn-access-log
      #   - --max-model-len
      #   - "32000"
      #   command:
      #   - vllm
      #   - serve
        env:
        - name: VLLM_NIXL_SIDE_CHANNEL_HOST
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        - name: VLLM_LOGGING_LEVEL
          value: DEBUG
        - name: NCCL_TELEMETRY_MODE
          value: "0"
        - name: DP_SIZE
          value: "1"
        - name: TP_SIZE
          value: "1"
        - name: HF_HOME
          value: /model-cache
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              key: HF_TOKEN
              name: llm-d-hf-token
        image: ghcr.io/llm-d/llm-d-cuda:v0.3.0
        imagePullPolicy: IfNotPresent
        name: vllm
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
        ports:
        - containerPort: 8000
          name: metrics
          protocol: TCP
        resources:
          limits:
            cpu: "8"
            memory: 640Gi
            nvidia.com/gpu: "8"
          requests:
            cpu: "8"
            memory: 640Gi
            nvidia.com/gpu: "8"
        volumeMounts:
        - mountPath: /.config
          name: metrics-volume
        - mountPath: /dev/shm
          name: shm
        - mountPath: /.cache
          name: torch-compile-cache
        - mountPath: /model-cache
          name: model-storage
        - name: gib
          mountPath: /usr/local/gib
      tolerations:
            - key: "nvidia.com/gpu"
              operator: "Equal"
              value: "present"
              effect: "NoSchedule"
      volumes:
      - emptyDir: {}
        name: metrics-volume
      - emptyDir:
          medium: Memory
          sizeLimit: 16Gi
        name: shm
      - emptyDir: {}
        name: torch-compile-cache
      - emptyDir:
          sizeLimit: 100Gi
        name: model-storage
      - name: gib
        hostPath:
          path: /home/kubernetes/bin/gib
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/managed-by: Helm
    app.kubernetes.io/version: v0.2.0
    helm.sh/chart: llm-d-modelservice-v0.2.11
  name: ms-pd-llm-d-modelservice-decode
spec:
  replicas: 1
  selector:
    matchLabels:
      llm-d.ai/inferenceServing: "true"
      llm-d.ai/model: ms-pd-llm-d-modelservice
      llm-d.ai/role: decode
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        llm-d.ai/inferenceServing: "true"
        llm-d.ai/model: ms-pd-llm-d-modelservice
        llm-d.ai/role: decode
      annotations:
        networking.gke.io/default-interface: 'eth0'
        networking.gke.io/interfaces: |
          [
            {"interfaceName":"eth0","network":"default"},
            {"interfaceName":"eth2","network":"rdma-0"},
            {"interfaceName":"eth3","network":"rdma-1"},
            {"interfaceName":"eth4","network":"rdma-2"},
            {"interfaceName":"eth5","network":"rdma-3"},
            {"interfaceName":"eth6","network":"rdma-4"},
            {"interfaceName":"eth7","network":"rdma-5"},
            {"interfaceName":"eth8","network":"rdma-6"},
            {"interfaceName":"eth9","network":"rdma-7"}
          ]
    spec:
      containers:
      - command:
        - /bin/bash
        - -c
        args:
        - |
          source /usr/local/gib/scripts/set_nccl_env.sh
          export LD_LIBRARY_PATH=/usr/local/nvidia/lib64:${LD_LIBRARY_PATH}
          vllm serve RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic \
            --port 8200 \
            --served-model-name "RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic" \
            --tensor-parallel-size 4 \
            --data-parallel-size 2 \
            --block-size 128 \
            --kv-transfer-config '{"kv_connector":"NixlConnector", "kv_role":"kv_both"}' \
            --disable-log-requests \
            --disable-uvicorn-access-log \
            --max-model-len 32000 \
            --gpu-memory-utilization 0.7
      # - args:
      #   - RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic
      #   - --port
      #   - "8200"
      #   - --served-model-name
      #   - RedHatAI/Llama-3.3-70B-Instruct-FP8-dynamic
      #   - --tensor-parallel-size
      #   - "4"
      #   - --block-size
      #   - "128"
      #   - --kv-transfer-config
      #   - '{"kv_connector":"NixlConnector", "kv_role":"kv_both"}'
      #   - --disable-uvicorn-access-log
      #   - --max-model-len
      #   - "32000"
      #   command:
      #   - vllm
      #   - serve
        env:
        - name: VLLM_NIXL_SIDE_CHANNEL_HOST
          valueFrom:
            fieldRef:
              apiVersion: v1
              fieldPath: status.podIP
        - name: VLLM_LOGGING_LEVEL
          value: DEBUG
        # - name: NCCL_TELEMETRY_MODE
        #   value: "0"
        # - name: NCCL_DEBUG
        #   value: "INFO"
        # - name: NCCL_DEBUG_SUBSYS
        #   value: "INIT,ENV,GRAPH,NET,COLL,TUNING"
        # - name: NCCL_DEBUG_FILE
        #   value: "/model-cache/nccl_log.txt"
        - name: HF_HOME
          value: /model-cache
        - name: HF_TOKEN
          valueFrom:
            secretKeyRef:
              key: HF_TOKEN
              name: llm-d-hf-token
        image: ghcr.io/llm-d/llm-d-cuda:v0.3.0
        imagePullPolicy: IfNotPresent
        name: vllm
        securityContext:
          allowPrivilegeEscalation: true
          runAsNonRoot: true
        ports:
        - containerPort: 8200
          name: metrics
          protocol: TCP
        resources:
          # claims:
            # - name: gpu
          limits:
            cpu: "16"
            memory: 640Gi
            nvidia.com/gpu: "8"
          requests:
            cpu: "16"
            memory: 640Gi
            nvidia.com/gpu: "8"
        volumeMounts:
        - mountPath: /.config
          name: metrics-volume
        - mountPath: /dev/shm
          name: shm
        - mountPath: /.cache
          name: torch-compile-cache
        - mountPath: /model-cache
          name: model-storage
        - name: gib
          mountPath: /usr/local/gib
      initContainers:
      - args:
        - --port=8000
        - --vllm-port=8200
        - --connector=nixlv2
        - -v=5
        - --secure-proxy=false
        image: ghcr.io/llm-d/llm-d-routing-sidecar:v0.3.0
        imagePullPolicy: Always
        name: routing-proxy
        ports:
        - containerPort: 8000
          protocol: TCP
        resources: {}
        restartPolicy: Always
        securityContext:
          allowPrivilegeEscalation: false
          runAsNonRoot: true
      tolerations:
            - key: "nvidia.com/gpu"
              operator: "Equal"
              value: "present"
              effect: "NoSchedule"
      volumes:
      - emptyDir: {}
        name: metrics-volume
      - emptyDir:
          medium: Memory
          sizeLimit: 16Gi
        name: shm
      - emptyDir: {}
        name: torch-compile-cache
      - emptyDir:
          sizeLimit: 200Gi
        name: model-storage
      - name: gib
        hostPath:
          path: /home/kubernetes/bin/gib
